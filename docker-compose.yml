version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: baseball-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: baseball
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d baseball"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: baseball-server
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: webApp/Dockerfile
    container_name: baseball-web
    ports:
      - "9000:80"
    depends_on:
      - server

volumes:
  postgres_data:
